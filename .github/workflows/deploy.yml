name: Deploy to GitHub Pages

# main ブランチへの push で自動ビルド＆デプロイする。
# 事前に GitHub リポジトリの Settings → Pages で
# 「Source: GitHub Actions」を選択しておく必要があります。

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを1本に制限（進行中のものはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (鍼灸アプリ / ルート)
        run: npm run build

      # るるくる業務マニュアル（Next.js）を /rirakuru サブパスへ書き出し、
      # 同じ Pages 成果物に同梱する（既存アプリは維持したまま追加）。
      - name: Install dependencies (rurukuru)
        run: npm ci
        working-directory: rirakuru-app

      - name: Build (るるくる業務マニュアル / /rirakuru)
        run: npm run build
        working-directory: rirakuru-app
        env:
          NEXT_PUBLIC_BASE_PATH: /-/rirakuru

      - name: Assemble Pages output
        run: |
          rm -rf dist/rirakuru
          cp -r rirakuru-app/out dist/rirakuru
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
